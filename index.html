<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pebble Buddies</title>
    <script>
      // Runtime fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when certain polyfills attempt to overwrite native fetch.
      (function() {
        try {
          if (typeof window !== 'undefined') {
            window.global = window;
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { /* Silently ignore overrides to prevent crash */ },
              configurable: true
            });
          }
        } catch (e) {
          console.warn('Pebble Buddies: Error applying fetch polyfill fix', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
